<section id="offers" class="py-24 bg-white">
  <div class="container mx-auto px-6">
    <!-- Section Header -->
    <div class="text-center mb-16">
      <h2 class="text-4xl lg:text-5xl font-bold text-slate-900">Exclusive Offers</h2>
      <p class="text-lg text-slate-500 mt-4">
        Check out our featured offers and opportunities.
      </p>
    </div>

    <!-- Top 3 Offers Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mb-12">
      <div *ngFor="let offer of topOffers"
        [ngClass]="getColorClasses(offer.color).bg + ' ' + getColorClasses(offer.color).border"
        class="rounded-xl shadow-sm border border-slate-100 hover:shadow-lg hover:-translate-y-1 transition-all duration-300 flex flex-col p-6 border-t-4">
        <div class="mb-4 flex items-start justify-between">
          <svg class="w-10 h-10" [ngClass]="getColorClasses(offer.color).text" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
            [innerHTML]="getSafeIcon(offer.icon)"></svg>
          <span [ngClass]="getColorClasses(offer.color).badge" class="text-xs font-bold px-3 py-1 rounded-full">
            {{ offer.badge }}
          </span>
        </div>
        <h4 class="text-xl font-bold text-slate-800 mb-1">{{ offer.title }}</h4>
        <p class="text-sm text-slate-600 mb-3">{{ offer.company }}</p>
        <p class="text-slate-600 mb-4 flex-grow">{{ offer.description }}</p>
        
        <div class="mb-5">
          <p *ngIf="offer.salary" class="font-semibold text-slate-800">{{ offer.salary }}</p>
          <p *ngIf="offer.price" class="font-semibold text-slate-800">{{ offer.price }}</p>
          <div *ngIf="offer.coupon" class="flex items-center gap-2">
            <p class="font-semibold text-slate-800">{{ offer.discount }}</p>
          </div>
        </div>
        
        <a [routerLink]="offer.actionLink"
          class="inline-block bg-gradient-to-r from-blue-500 to-blue-600 text-white font-semibold px-6 py-2 rounded-lg hover:shadow-lg transition-all duration-300 text-center">
          {{ offer.actionLabel }}
        </a>
      </div>
    </div>

    <!-- View All Offers Button -->
    <div class="text-center">
      <a [routerLink]="'/offers'"
        class="inline-block bg-gradient-to-r from-slate-700 to-slate-900 text-white font-semibold px-8 py-3 rounded-lg hover:shadow-lg transition-all duration-300">
        View All Offers & Opportunities →
      </a>
    </div>

  </div>
</section>
